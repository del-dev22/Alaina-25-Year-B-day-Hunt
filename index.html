<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Adventure</title>
<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #ffdde1, #ee9ca7);
        color: #333;
        text-align: center;
        padding: 20px;
        margin: 0;
    }

    .card {
        background: white;
        max-width: 700px;
        margin: 20px auto;
        padding: 24px;
        border-radius: 22px;
        box-shadow: 0 12px 30px rgba(0,0,0,0.18);
    }

    h1, h2 {
        margin-top: 0;
    }

    p {
        line-height: 1.5;
    }

    button {
        padding: 12px 20px;
        border: none;
        border-radius: 12px;
        background: #ff6b81;
        color: white;
        font-size: 16px;
        margin-top: 12px;
        cursor: pointer;
    }

    input {
        padding: 12px;
        border-radius: 12px;
        border: 1px solid #ccc;
        width: 85%;
        max-width: 320px;
        margin-top: 10px;
        font-size: 16px;
    }

    .photo-cover {
        width: 100%;
        max-width: 100%;
        height: auto;
        border-radius: 18px;
        margin: 16px 0;
        box-shadow: 0 8px 18px rgba(0,0,0,0.12);
    }

    .choice-stack {
        display: flex;
        flex-direction: column;
        gap: 15px;
        padding: 10px 0;
    }

    .choice-stack img {
        width: 100%;
        height: auto;
        border-radius: 16px;
        cursor: pointer;
        box-shadow: 0 8px 16px rgba(0,0,0,0.10);
        transition: transform 0.15s ease;
    }

    .choice-stack img:active {
        transform: scale(0.98);
    }

    .subtle {
        font-size: 14px;
        color: #666;
    }
</style>
</head>
<body>

<div id="app" class="card"></div>

<script>
let step = 0;
let hintLevel = 0;
let attempts = 0;

let scoreLow = 0;
let scoreMid = 0;
let scoreHigh = 0;

let isUnlocked = false;
const gameMasterCode = "Ham B-Day";

function nextStep(s) {
    step = s;
    render();
}

function resetPuzzleState() {
    hintLevel = 0;
    attempts = 0;
}

function unlockGame() {
    const input = document.getElementById("masterCode").value.trim();

    if (input === gameMasterCode) {
        isUnlocked = true;
        step = 0;
        render();
    } else {
        alert("Wrong!! Wait Until I let you in 🔒");
    }
}

function checkAnswer(correct) {
    const input = document.getElementById("answer").value.trim().toLowerCase();
    attempts++;

    if (input === correct.toLowerCase()) {
        nextStep(step + 1);
    } else {
        alert("Wrongo");

        const hintButton = document.getElementById("hintButton");
        if (hintButton && attempts >= 2) {
            hintButton.style.display = "inline-block";
        }
    }
}

function showHint(hints) {
    hintLevel++;

    const hintBox = document.getElementById("hintBox");
    if (!hintBox) return;

    const hintIndex = Math.min(hintLevel - 1, hints.length - 1);
    hintBox.innerText = hints[hintIndex];
}

function answer(choice) {
    if (choice === "low") scoreLow++;
    if (choice === "mid") scoreMid++;
    if (choice === "high") scoreHigh++;

    document.getElementById("app").innerHTML = "<h2>This choice has consequences,<br>but I get what you are putting down</h2>";

    setTimeout(() => {
        nextStep(step + 1);
    }, 800);
}

function openMap(lat, lng) {
    const googleUrl = `https://maps.google.com/?q=${lat},${lng}`;
    const appleUrl = `https://maps.apple.com/?ll=${lat},${lng}`;

    window.location.href = googleUrl;

    setTimeout(() => {
        window.location.href = appleUrl;
    }, 1200);
}

function getFinalChoice() {
    if (scoreLow >= scoreMid && scoreLow >= scoreHigh) {
        return "low";
    } else if (scoreMid >= scoreLow && scoreMid >= scoreHigh) {
        return "mid";
    } else {
        return "high";
    }
}

function render() {
    const app = document.getElementById("app");

    if (!isUnlocked) {
        app.innerHTML = `
            <h1>🔒 Birthday Adventure</h1>
            <p>Your experience is waiting for the game master to begin.</p>
            <p>Enter the game master code to unlock it.</p>

            <input id="masterCode" type="password" placeholder="Game master code">
            <br>
            <button onclick="unlockGame()">Unlock</button>

            <p class="subtle">All bubble-blowing babies will be beaten senseless by every able-bodied patron in the bar</p>
        `;
        return;
    }

    if (step === 0) {
        app.innerHTML = `
            <h1>🍖 Happy Birthday 🍖</h1>
            <p>Welcome to your B-day Hunt.</p>
            <p>I will be your game master for today.</p>

            <img src="intro.jpg" alt="Cover Photo" class="photo-cover">

            <p class="subtle">Your mission: solve the clues, answer the mystery questions, and follow the trail.</p>

            <button onclick="nextStep(1)">Start</button>
        `;
    }

    if (step === 1) {
        resetPuzzleState();
        app.innerHTML = `
            <h2>Clue 1 ☕</h2>
            <p>
                Lets start off strong for your lovely day of birth.<br>
                Decipher this code to unlock the first destination:<br><br>
                20 8 5 &nbsp; 13 21 19 5
            </p>

            <input id="answer" placeholder="Enter your answer">
            <br>
            <button onclick="checkAnswer('the muse')">Submit</button>

            <br><br>
            <button id="hintButton" onclick='showHint([
                "Try converting numbers into letters 👀",
                "1 = A, 2 = B, 3 = C...",
                "It is the coffee stop to start the morning ☕"
            ])' style="display:none;">Hint 💡</button>

            <p id="hintBox" class="subtle"></p>
        `;
    }

    if (step === 2) {
        app.innerHTML = `
            <h2>Quick question 1</h2>
            <p>What kind of ending sounds best right now?</p>

            <div class="choice-stack">
                <img src="low1.jpg" alt="Low Adventure" onclick="answer('low')">
                <img src="mid1.jpg" alt="Mid Adventure" onclick="answer('mid')">
                <img src="high1.jpg" alt="High Adventure" onclick="answer('high')">
            </div>
        `;
    }

    if (step === 3) {
        app.innerHTML = `
            <h2>📍 Destination 1 unlocked</h2>
            <p>Go here to continue:</p>
            <button onclick="openMap(48.001406507031, -122.22194166845058)">Open in Maps</button>
            <br><br>
            <button onclick="nextStep(4)">I'm Here</button>
        `;
    }

    if (step === 4) {
        resetPuzzleState();
        app.innerHTML = `
            <h2>Arrival Check ✅</h2>
            <p>Find the physical code at this location to unlock the next clue.</p>

            <input id="answer" placeholder="Enter location code">
            <br>
            <button onclick="checkAnswer('MUSE25')">Submit</button>
        `;
    }

    if (step === 5) {
        resetPuzzleState();
        app.innerHTML = `
            <h2>Clue 2 🌊</h2>
            <p>
                Not quite the ocean, but it still tells a tale,<br>
                Where waves meet the shore and sunsets don’t fail.<br>
                We walked side by side with nothing to prove.<br>
                Find the place where the water and skyline move.
            </p>

            <input id="answer" placeholder="Enter your answer">
            <br>
            <button onclick="checkAnswer('marina park')">Submit</button>

            <br><br>
            <button id="hintButton" onclick='showHint([
                "Think waterfront 👀",
                "Think shoreline and walking paths",
                "It is Marina Park"
            ])' style="display:none;">Hint 💡</button>

            <p id="hintBox" class="subtle"></p>
        `;
    }

    if (step === 6) {
        app.innerHTML = `
            <h2>Quick question 2</h2>
            <p>Pick the mood that sounds best later tonight.</p>

            <div class="choice-stack">
                <img src="low2.jpg" alt="Low Adventure" onclick="answer('low')">
                <img src="mid2.jpg" alt="Mid Adventure" onclick="answer('mid')">
                <img src="high2.jpg" alt="High Adventure" onclick="answer('high')">
            </div>
        `;
    }

    if (step === 7) {
        app.innerHTML = `
            <h2>📍 Destination 2 unlocked</h2>
            <p>Go here to continue:</p>
            <button onclick="openMap(47.6765, -122.2090)">Open in Maps</button>
            <br><br>
            <button onclick="nextStep(8)">I'm Here</button>
        `;
    }

    if (step === 8) {
        resetPuzzleState();
        app.innerHTML = `
            <h2>Arrival Check ✅</h2>
            <p>Find the physical code at this location to unlock the next clue.</p>

            <input id="answer" placeholder="Enter location code">
            <br>
            <button onclick="checkAnswer('WATER25')">Submit</button>
        `;
    }

    if (step === 9) {
        resetPuzzleState();
        app.innerHTML = `
            <h2>Clue 3 🌲</h2>
            <p>
                Away from the noise, where the world slows down,<br>
                A hidden escape just outside of town.<br>
                Where silence says more than words ever could,<br>
                Find the place wrapped in calm and wood.
            </p>

            <input id="answer" placeholder="Enter your answer">
            <br>
            <button onclick="checkAnswer('juanita bay park')">Submit</button>

            <br><br>
            <button id="hintButton" onclick='showHint([
                "Think nature 👀",
                "Think a peaceful park",
                "It is Juanita Bay Park"
            ])' style="display:none;">Hint 💡</button>

            <p id="hintBox" class="subtle"></p>
        `;
    }

    if (step === 10) {
        app.innerHTML = `
            <h2>Quick question 3</h2>
            <p>Choose the energy that feels right for the end of the night.</p>

            <div class="choice-stack">
                <img src="low3.jpg" alt="Low Adventure" onclick="answer('low')">
                <img src="mid3.jpg" alt="Mid Adventure" onclick="answer('mid')">
                <img src="high3.jpg" alt="High Adventure" onclick="answer('high')">
            </div>
        `;
    }

    if (step === 11) {
        app.innerHTML = `
            <h2>📍 Destination 3 unlocked</h2>
            <p>Go here to continue:</p>
            <button onclick="openMap(47.7081, -122.2275)">Open in Maps</button>
            <br><br>
            <button onclick="nextStep(12)">I'm Here</button>
        `;
    }

    if (step === 12) {
        resetPuzzleState();
        app.innerHTML = `
            <h2>Arrival Check ✅</h2>
            <p>Find the physical code at this location to unlock the next clue.</p>

            <input id="answer" placeholder="Enter location code">
            <br>
            <button onclick="checkAnswer('PARK25')">Submit</button>
        `;
    }

    if (step === 13) {
        resetPuzzleState();
        app.innerHTML = `
            <h2>Clue 4 ❤️</h2>
            <p>
                The day is not over, there is one more surprise.<br>
                A final stop chosen by your heart in disguise.<br>
                Every little answer has helped clear the way.<br>
                Now let us reveal where we end the day.
            </p>

            <button onclick="nextStep(14)">Continue</button>
        `;
    }

    if (step === 14) {
        app.innerHTML = `
            <h2>Quick question 4</h2>
            <p>Last one. Pick what sounds most exciting.</p>

            <div class="choice-stack">
                <img src="low4.jpg" alt="Low Adventure" onclick="answer('low')">
                <img src="mid4.jpg" alt="Mid Adventure" onclick="answer('mid')">
                <img src="high4.jpg" alt="High Adventure" onclick="answer('high')">
            </div>
        `;
    }

    if (step === 15) {
        app.innerHTML = `
            <h2>Calculating your perfect ending…</h2>
        `;

        setTimeout(() => {
            step = 16;
            render();
        }, 1800);
    }

    if (step === 16) {
        const choice = getFinalChoice();

        let place = "";
        let message = "";
        let coords = { lat: 0, lng: 0 };

        if (choice === "low") {
            place = "Your Low Adventure Dinner Spot";
            message = "Tonight calls for something cozy, comforting, and easy ❤️";
            coords = { lat: 47.0000, lng: -122.0000 };
        } else if (choice === "mid") {
            place = "Your Mid Adventure Dinner Spot";
            message = "A little adventure, a little comfort, and the perfect balance ✨";
            coords = { lat: 47.0000, lng: -122.0000 };
        } else {
            place = "Your High Adventure Dinner Spot";
            message = "You chose adventure, so let’s make tonight unforgettable 🌍";
            coords = { lat: 47.0000, lng: -122.0000 };
        }

        app.innerHTML = `
            <h2>Final Destination ❤️</h2>
            <p>${message}</p>
            <p><strong>${place}</strong></p>

            <button onclick="openMap(${coords.lat}, ${coords.lng})">Take me there</button>

            <br><br>
            <button onclick="nextStep(17)">Continue</button>
        `;
    }

    if (step === 17) {
        app.innerHTML = `
            <h1>❤️ You Found Me ❤️</h1>
            <p>This was never just about the locations.</p>
            <p>It was always about us.</p>
            <p>I love you.</p>
        `;
    }
}

render();
</script>

</body>
</html>
