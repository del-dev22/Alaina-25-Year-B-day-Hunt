<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alaina 25th B-day Hunt</title>
<style>
    body {
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(100deg, #5AA38F, #4faad7);
        color: #33;
        text-align: center;
        padding: 50px;
    }
    .card {
        background: White;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 100px 30px rgba(0,0,0,.5);
        margin-top: 40px;
    }
    button {
        padding: 12px 20px;
        border: none;
        border-radius: 10px;
        background: #5AA38F;
        color: White;
        font-size: 25px;
        margin-top: 15px;
    }
    input {
        padding: 10px;
        border-radius: 10px;
        border: 1px solid;
        width: 80%;
        margin-top: 10px;
    }
    .hidden {
        display: none;
    }
</style>
</head>

<body>

<div id="app" class="card">
    <h1>🍖 Happy Birthday HAM 🍖</h1>
    <p>I will be your game Master</p>
    <img src="intro.jpg"
        style="max-width: 100%; height: auto; border-radius: 15px; margin: 15px 0;">
    <button onclick="nextStep(1)">Start</button>

</div>

<script>
let step = 0;
let hintLevel = 0;
let attempts = 0;
let scorelow = 0;
let scoremid = 0;
let scorehigh = 0;

function nextStep(s) {
    step = s;
    render();
}

function checkAnswer(correct) {
    let input = document.getElementById("answer").value.toLowerCase();
    attempts++;

    if (input.includes(correct)) {
        nextStep(step + 1);
    } else {
        alert("Not quite 😊");

        if (attempts >= 2) {
            document.getElementById("hintButton").style.display = "inline-block";
        }
    }
}
 function showHint() {
    hintLevel++;

    let hintText = "";

    if (hintLevel === 1) {
        hintText = "Try looking at each word a little more carefully 👀";
    } else if (hintLevel === 2) {
        hintText = "Maybe a specific letter in each word matters...";
    } else if (hintLevel === 3) {
        hintText = "Focus on the 3rd letter of each word 😉";
    } else {
        hintText = "You’ve got this 💛";
    }

    document.getElementById("hintBox").innerText = hintText;
}

function openMap(lat, lng) {
    const googleUrl = `https://maps.google.com/?q=${lat},${lng}`;
    const appleUrl = `https://maps.apple.com/?ll=${lat},${lng}`;

    // Try Google Maps
    window.location.href = googleUrl;

    // Fallback after a short delay (for iOS issues)
    setTimeout(() => {
        window.location.href = appleUrl;
    }, 1500);
}

function render() {
    let app = document.getElementById("app");

    if (step === 1) {
    hintLevel = 0;
    attempts = 0;

    app.innerHTML = `
    <h2>Clue 1 ☕</h2>

    <p>Lets start off strong for your lovely day of birth,<br> decipher this code to unlock the first destination:<br><br> 20-8-5-13-21-19-5</p>

    <input id="answer" placeholder="Enter your answer">
    <br>
    <button onclick="checkAnswer('the muse')">Submit</button>

    <br><br>

    <button id="hintButton" onclick="showHint()" style="display:none;">
        Hint 💡
    </button>

    <p id="hintBox" style="margin-top:10px; color:#555;"></p>
    `;
}

function answer(choice) {
    if (choice === 'low') scorelow++;
    if (choice === 'mid') scoremid++;
    if (choice === 'high') scorehigh++;

    document.getElementById("app").innerHTML = "<h2>Nice choice 😏</h2>";

    setTimeout(() => {
        nextStep(step + 1);
    }, 1000);
}
   
  if (step === 2) {
    app.innerHTML = `
    <h2>Pick a vib️e</h2>

     <div style="position:absolute; width:100%; height:100%;">

        <img src="low1.jpg"
             onclick="answer('low')"
             style="width:100%; border-radius:15px; cursor:pointer;">

        <img src="mid1.jpg"
             onclick="answer('mid')"
             style="width:100%; border-radius:15px; cursor:pointer;">

        <img src="high1.jpg"
             onclick="answer('high')"
             style="width:100%; border-radius:15px; cursor:pointer;">

    </div>
    `;
}
    if (step === 3) {
    app.innerHTML = `
    <h2>📍 Destination 1 has been unlocked</h2>
    <p>Go here to continue:</p>
    <button onclick="openMap(48.001406507031, -122.22194166845058)">Open in Maps</button>
    <br><br>
    <button onclick="nextStep(3)">I'm Here</button>
    `;
}

    if (step === 4) {
        app.innerHTML = `
        <h2>Clue 2</h2>
        <p>Not quite the ocean, but it still tells a tale,<br>
        Where waves meet the shore and sunsets don’t fail.<br>
        We walked side by side with nothing to prove—<br>
        Find the place where the water and skyline move.</p>

        <input id="answer">
        <br>
        <button onclick="checkAnswer('water')">Submit</button>
        `;
    }
    
 if (step === 5) {
    app.innerHTML = `
    <h2>What speaks to you</h2>

      <div style="display:flex; flex-direction:column; gap:15px;">

        <img src="low2.jpg"
             onclick="answer('low')"
             style="width:100%; border-radius:15px; cursor:pointer;">

        <img src="mid2.jpg"
             onclick="answer('mid')"
             style="width:100%; border-radius:15px; cursor:pointer;">

        <img src="high2.jpg"
             onclick="answer('high')"
             style="width:100%; border-radius:15px; cursor:pointer;">

    </div>
    `;
}

    if (step === 6) {
        app.innerHTML = `
        <h2>📍 Location 2</h2>
        <button onclick="openMap(47.6765, -122.2090)">Open in Maps</button>
        <br><br>
        <button onclick="nextStep(5)">I'm Here</button>
        `;
    }

    if (step === 7) {
        app.innerHTML = `
        <h2>Clue 3</h2>
        <p>Away from the noise, where the world slows down,<br>
        A hidden escape just outside of town.<br>
        Where silence says more than words ever could—<br>
        Find the place wrapped in calm and wood.</p>

        <input id="answer">
        <br>
        <button onclick="checkAnswer('park')">Submit</button>
        `;
    }
 if (step === 8) {
    app.innerHTML = `
    <h2>Pick a vib️e</h2>

      <div style="display:flex; flex-direction:column; gap:15px;">

        <img src="low3.jpg"
             onclick="answer('low')"
             style="width:100%; border-radius:15px; cursor:pointer;">

        <img src="mid3.jpg"
             onclick="answer('mid')"
             style="width:100%; border-radius:15px; cursor:pointer;">

        <img src="high3.jpg"
             onclick="answer('high')"
             style="width:100%; border-radius:15px; cursor:pointer;">

    </div>
    `;
}

    if (step === 9) {
        app.innerHTML = `
        <h2>📍 Location 3</h2>
        <button onclick="openMap(47.7081, -122.2275)">Open in Maps</button>
        <br><br>
        <button onclick="nextStep(7)">I'm Here</button>
        `;
    }
    
    function getFinalChoice() {
    if (scorelow >= scoremid && scorelow >= scorehigh) {
        return "low";
    } else if (scoremid >= scorelow && scoremid >= scorehigh) {
        return "mid";
    } else {
        return "high";
    }
}

    if (step === 10) {
    const choice = getFinalChoice();

    let place = "";
    let message = "";

    if (choice === "low") {
        place = "Your Fancy Restaurant Name";
        message = "Tonight… we dress up ✨";
    } else if (choice === "mid") {
        place = "Your Casual Spot";
        message = "Keeping it relaxed and fun 😄";
    } else {
        place = "Your Adventurous Spot";
        message = "Let’s try something new 🌍";
    }

    app.innerHTML = `
    <h2>Final Destination ❤️</h2>
    <p>${message}</p>

    <button onclick="openMapPlace('${place}')">
        Take me there
    </button>
    `;
}

    if (step === 11) {
        app.innerHTML = `
        <h1>❤️ You Found Me ❤️</h1>
        <p>This was never about the locations… it was always about us.</p>
        <p>I love you.</p>
        `;
    }
}
</script>

</body>
</html>
